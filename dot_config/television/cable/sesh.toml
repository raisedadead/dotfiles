[metadata]
name = "sesh"
description = "Session manager — tmux + config + zoxide via sesh"
requirements = ["sesh"]

[source]
command = "sesh list --icons"
ansi = true
output = "{strip_ansi|split: :1..|join: }"

[preview]
command = "sesh preview '{strip_ansi|split: :1..|join: }'"
footer = "⏎ Connect  ^E Editor  ^V VS Code  ^D Kill"

[ui]
input_header = "Sessions"

[ui.preview_panel]
word_wrap = true

[keybindings]
enter = "actions:connect"
ctrl-d = ["actions:kill_session", "reload_source"]
ctrl-e = "actions:editor"
ctrl-v = "actions:visual"

[actions.connect]
description = "Connect to session"
command = "sesh connect '{strip_ansi|split: :1..|join: }'"
mode = "execute"

[actions.kill_session]
description = "Kill session"
command = "tmux kill-session -t '{strip_ansi|split: :1..|join: }'"
mode = "fork"

[actions.editor]
description = "Open in editor"
command = "${EDITOR:-nvim} '{strip_ansi|split: :1..|join: }'"
mode = "execute"

[actions.visual]
description = "Open in VS Code"
command = "${VISUAL:-code} '{strip_ansi|split: :1..|join: }'"
mode = "execute"
