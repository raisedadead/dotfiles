# Catppuccin Mocha palette
set -g @clr_rosewater "#f5e0dc"
set -g @clr_flamingo "#f2cdcd"
set -g @clr_pink "#f5c2e7"
set -g @clr_mauve "#cba6f7"
set -g @clr_red "#f38ba8"
set -g @clr_maroon "#eba0ac"
set -g @clr_peach "#fab387"
set -g @clr_yellow "#f9e2af"
set -g @clr_green "#a6e3a1"
set -g @clr_teal "#94e2d5"
set -g @clr_sky "#89dceb"
set -g @clr_sapphire "#74c7ec"
set -g @clr_blue "#89b4fa"
set -g @clr_lavender "#b4befe"
set -g @clr_text "#cdd6f4"
set -g @clr_subtext1 "#bac2de"
set -g @clr_subtext0 "#a6adc8"
set -g @clr_overlay2 "#9399b2"
set -g @clr_overlay1 "#7f849c"
set -g @clr_overlay0 "#6c7086"
set -g @clr_surface2 "#585b70"
set -g @clr_surface1 "#45475a"
set -g @clr_surface0 "#313244"
set -g @clr_base "#1e1e2e"
set -g @clr_mantle "#181825"
set -g @clr_crust "#11111b"

# Borders and messages
# Clear stale window-level overrides on reload so globals take effect
run-shell 'for W in $(tmux list-windows -F "#{window_id}"); do tmux set -u -t "$W" pane-active-border-style 2>/dev/null; tmux set -u -t "$W" pane-border-status 2>/dev/null; tmux set -u -t "$W" pane-border-lines 2>/dev/null; done'
set -g pane-border-style fg=brightblack
set -g pane-border-indicators off
set -g pane-border-lines single
run-shell 'tmux set -g pane-active-border-style "fg=#{@clr_sapphire}"'
set -g pane-border-status off
set -g pane-border-format "#{?pane_in_mode,#[align=centre#,fg=#{@clr_base}#,bg=#{@clr_mauve}#,bold] 󰍽 #{scroll_position}/#{history_size} #[default],#{?pane_synchronized,#[align=centre#,fg=#{@clr_base}#,bg=#{@clr_red}#,bold] 󰓦 #{b:pane_current_path} (#{?#{m/r:^[0-9],#{pane_current_command}},claude,#{pane_current_command}}) #[default],#{?pane_active,#[align=centre#,fg=#{@clr_base}#,bg=#{@clr_sapphire}#,bold] #{b:pane_current_path} (#{?#{m/r:^[0-9],#{pane_current_command}},claude,#{pane_current_command}}) #[default],#[align=centre#,fg=#{@clr_base}#,bg=#{@clr_overlay1}#,bold] #{b:pane_current_path} (#{?#{m/r:^[0-9],#{pane_current_command}},claude,#{pane_current_command}}) #[default]}}}"
set-hook -g pane-mode-changed "run 'W=#{window_id}; P=#{window_panes}; if [ #{pane_in_mode} -eq 1 ]; then tmux set -t \$W pane-active-border-style fg=#{@clr_mauve}; tmux set -t \$W pane-border-lines single; tmux set -t \$W pane-border-status bottom; elif [ #{pane_synchronized} -eq 1 ]; then tmux set -t \$W pane-active-border-style fg=#{@clr_red}; tmux set -t \$W pane-border-status bottom; else tmux set -t \$W pane-active-border-style fg=#{@clr_sapphire}; tmux set -t \$W pane-border-lines single; if [ \$P -gt 1 ]; then tmux set -t \$W pane-border-status bottom; else tmux set -t \$W pane-border-status off; fi; fi'"
set-hook -g window-layout-changed "run 'W=#{window_id}; P=#{window_panes}; if [ \$P -gt 1 ]; then tmux set -t \$W pane-border-status bottom; else tmux set -t \$W pane-border-status off; fi'"
set -g popup-border-style fg=white
set -g popup-style default
set -g message-style bg=yellow,fg=black
set -g message-command-style bg=cyan,fg=black
set -g mode-style bg=brightblack,fg=white
set -g copy-mode-position-format ''
set -g display-time 1500

# Status bar — three-zone layout via status-format[0]
#
# Follows Catppuccin design: muted surfaces for zones, vibrant accents for small indicators.
#
# ┌─ left (surface0 bg) ───┬── centre (pill, surface1 bg) ────────────┬── right (surface0 bg) ─┐
# │  ●  ●  ●² (dots)     ╱ │  ( session // 1:win / 2:win  ← ◆ )       │ ╲  ■² ■  (squares)    │
# └─────────────────────────┴──────────────────────────────────────────┴────────────────────────┘
#
# Left zone (surface0 bg): window dots
#   Mauve=active, overlay2=inactive, superscript pane count (²-⁹) with static gap
#
# Centre zone (surface1 bg, rounded pill): session name // window names
#   Session: green icon (red when prefix). Windows: text=inactive, mauve=active
#   Separators (// and /): overlay0. Indicators: yellow ← zoom, ◆ prefix
#
# Right zone (surface0 bg): session squares
#   Green=attached, overlay2=other, superscript window count (²-⁹)
#
set -g status 2
set -g status-style bg=default,fg=brightblack
set -g status-format[1] ""
set -g status-format[0] "\
#[align=left]#[bg=#{@clr_surface0}] \
#{W:\
#[fg=#{@clr_overlay2}]●#{?#{>:#{window_panes},1},#{?#{==:#{window_panes},2},²,#{?#{==:#{window_panes},3},³,#{?#{==:#{window_panes},4},⁴,#{?#{==:#{window_panes},5},⁵,#{?#{==:#{window_panes},6},⁶,#{?#{==:#{window_panes},7},⁷,#{?#{==:#{window_panes},8},⁸,#{?#{==:#{window_panes},9},⁹,⁺}}}}}}}}, }\
,\
#[fg=#{@clr_mauve}]●#{?#{>:#{window_panes},1},#{?#{==:#{window_panes},2},²,#{?#{==:#{window_panes},3},³,#{?#{==:#{window_panes},4},⁴,#{?#{==:#{window_panes},5},⁵,#{?#{==:#{window_panes},6},⁶,#{?#{==:#{window_panes},7},⁷,#{?#{==:#{window_panes},8},⁸,#{?#{==:#{window_panes},9},⁹,⁺}}}}}}}}, }\
}\
#[fg=#{@clr_surface0}]#[bg=default]\
#[align=centre]\
#{?window_zoomed_flag,#[fg=#{@clr_yellow}]#[bg=default]#[bg=#{@clr_yellow}]#[fg=#{@clr_crust}]󰍉#[fg=#{@clr_yellow}]#[bg=default] ,}\
#[fg=#{@clr_surface1}]#[bg=default]#[bg=#{@clr_surface1}]\
#{?client_prefix,#[fg=#{@clr_red}],#[fg=#{@clr_green}]} #{session_name} \
#[fg=#{@clr_overlay0}]/\
#{W:\
#[fg=#{@clr_overlay0}]/ #[fg=#{@clr_text}]#{window_index}:#{window_name} \
,\
#[fg=#{@clr_overlay0}]/ #[fg=#{@clr_yellow}]#{window_index}:#{window_name} \
}\
#[fg=#{@clr_surface1}]#[bg=default]\
#{?client_prefix, #[fg=#{@clr_yellow}]#[bg=default]#[bg=#{@clr_yellow}]#[fg=#{@clr_crust}]󰌌#[fg=#{@clr_yellow}]#[bg=default],}\
#[align=right]\
#[fg=#{@clr_surface0}]#[bg=default]#[bg=#{@clr_surface0}] \
#{S:\
#[fg=#{@clr_overlay2}]■#{?#{>:#{session_windows},1},#{?#{==:#{session_windows},2},²,#{?#{==:#{session_windows},3},³,#{?#{==:#{session_windows},4},⁴,#{?#{==:#{session_windows},5},⁵,#{?#{==:#{session_windows},6},⁶,#{?#{==:#{session_windows},7},⁷,#{?#{==:#{session_windows},8},⁸,#{?#{==:#{session_windows},9},⁹,⁺}}}}}}}}, }\
,\
#[fg=#{@clr_green}]■#{?#{>:#{session_windows},1},#{?#{==:#{session_windows},2},²,#{?#{==:#{session_windows},3},³,#{?#{==:#{session_windows},4},⁴,#{?#{==:#{session_windows},5},⁵,#{?#{==:#{session_windows},6},⁶,#{?#{==:#{session_windows},7},⁷,#{?#{==:#{session_windows},8},⁸,#{?#{==:#{session_windows},9},⁹,⁺}}}}}}}}, }\
}\
 "
