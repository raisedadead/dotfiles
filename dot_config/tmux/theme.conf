# Borders and messages
set -g pane-border-style fg=brightblack
set -g pane-border-indicators off
set -g pane-border-lines spaces
set -g pane-active-border-style fg=#f5e0dc
set -g pane-border-status off
set -g pane-border-format "#{?pane_in_mode,#[fg=#1E1E2E#,bg=#CBA6F7#,bold] 󰍽 #{scroll_position}/#{history_size} #[default],#{?pane_synchronized,#[fg=#1E1E2E#,bg=#F38BA8#,bold] 󰓦 #[default],}}"
set-hook -g pane-mode-changed 'if -F "#{pane_in_mode}" "set pane-active-border-style fg=#CBA6F7 ; set pane-border-lines single ; set pane-border-status bottom" "if -F \"#{pane_synchronized}\" \"set pane-active-border-style fg=#F38BA8 ; set pane-border-status bottom\" \"set pane-active-border-style fg=white ; set pane-border-lines spaces ; set pane-border-status off\""'
set -g popup-border-style fg=white
set -g popup-style default
set -g message-style bg=yellow,fg=black
set -g message-command-style bg=cyan,fg=black
set -g mode-style bg=brightblack,fg=white
set -g copy-mode-position-format '#[fg=#1E1E2E,bg=#CBA6F7,bold] 󰍽 #{scroll_position}/#{history_size} '
set -g display-time 1500

# Status bar — three-zone slant layout via status-format[0]
#
# ┌─ left (surface0 bg) ─────────────────┬── centre (pill) ──┬── right (surface0 bg) ─┐
# │  ● 1:zsh  ● 2:vim  ● 3:node  ← ◆  ╱ │  ( session )      │ ╲  ■ⁿ squares          │
# └──────────────────────────────────────┴───────────────────┴────────────────────────┘
#
# Slant separators: U+E0B8 after left, U+E0BA before right
# Pill separators: U+E0B6 left edge, U+E0B4 right edge
# Background: #45475A (Catppuccin Mocha surface1) for zones
#
# Left zone: window dots + names on surface0
#   Dot colors: peach(#FAB387)=active, brightyellow=bell, red=error, blue=activity, brightblack=idle
#   Superscript pane count (²-⁹) when window has >= 2 panes
#   Name: peach(#FAB387)=active, brightblack=inactive
#   Trailing indicators: ← yellow when zoomed, ◆ yellow when prefix active
#
# Centre zone: session name in rounded pill
#   Magenta text on surface0 bg, rounded separators
#
# Right zone: session squares on surface0
#   Colors: green=attached, brightblack=other
#   Superscript window count (²-⁹) when session has >= 2 windows
#
set -g status 2
set -g status-style bg=default,fg=brightblack
set -g status-format[0] "\
#[align=left]#[bg=#45475A] \
#{W:\
#{?window_bell_flag,#[fg=brightyellow],\
#{?#{&&:#{@last_exit_code},#{!=:#{@last_exit_code},0}},#[fg=red],#{?window_activity_flag,#[fg=blue],#[fg=#A6ADC8]}\
}}●\
#{?#{>:#{window_panes},1},\
#{?#{==:#{window_panes},2},²,\
#{?#{==:#{window_panes},3},³,\
#{?#{==:#{window_panes},4},⁴,\
#{?#{==:#{window_panes},5},⁵,\
#{?#{==:#{window_panes},6},⁶,\
#{?#{==:#{window_panes},7},⁷,\
#{?#{==:#{window_panes},8},⁸,\
#{?#{==:#{window_panes},9},⁹,\
⁺}}}}}}}},}\
 #[fg=#A6ADC8]#{window_index}:#{window_name} \
,\
#[fg=#FAB387]●\
#{?#{>:#{window_panes},1},\
#{?#{==:#{window_panes},2},²,\
#{?#{==:#{window_panes},3},³,\
#{?#{==:#{window_panes},4},⁴,\
#{?#{==:#{window_panes},5},⁵,\
#{?#{==:#{window_panes},6},⁶,\
#{?#{==:#{window_panes},7},⁷,\
#{?#{==:#{window_panes},8},⁸,\
#{?#{==:#{window_panes},9},⁹,\
⁺}}}}}}}},}\
 #[fg=#FAB387]#{window_index}:#{window_name} \
}\
#{?window_zoomed_flag,#[fg=yellow]← ,}\
#{?client_prefix,#[fg=yellow]◆ ,}\
#[fg=#45475A,bg=default]\
#[align=centre]\
#[fg=#45475A,bg=default]#[bg=#45475A,fg=magenta] #{session_name} #[fg=#45475A,bg=default]\
#[align=right]\
#[fg=#45475A,bg=default]#[bg=#45475A] \
#{S:\
#[fg=brightblack]■\
#{?#{>:#{session_windows},1},\
#{?#{==:#{session_windows},2},²,\
#{?#{==:#{session_windows},3},³,\
#{?#{==:#{session_windows},4},⁴,\
#{?#{==:#{session_windows},5},⁵,\
#{?#{==:#{session_windows},6},⁶,\
#{?#{==:#{session_windows},7},⁷,\
#{?#{==:#{session_windows},8},⁸,\
#{?#{==:#{session_windows},9},⁹,\
⁺}}}}}}}}, \
}\
,\
#[fg=green]■\
#{?#{>:#{session_windows},1},\
#{?#{==:#{session_windows},2},²,\
#{?#{==:#{session_windows},3},³,\
#{?#{==:#{session_windows},4},⁴,\
#{?#{==:#{session_windows},5},⁵,\
#{?#{==:#{session_windows},6},⁶,\
#{?#{==:#{session_windows},7},⁷,\
#{?#{==:#{session_windows},8},⁸,\
#{?#{==:#{session_windows},9},⁹,\
⁺}}}}}}}}, \
}\
} "
set -g status-format[1] ""
