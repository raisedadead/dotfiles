}\
#{?window_zoomed_flag,#[fg=yellow]вҶҗ ,}\
#{?client_prefix,#[fg=yellow]в—Ҷ ,}\
#[fg=#45475A,bg=default]оӮё\
#[align=centre]\
#[fg=#45475A,bg=default]оӮ¶#[bg=#45475A,fg=magenta] #{session_name} #[fg=#45475A,bg=default]оӮҙ\
