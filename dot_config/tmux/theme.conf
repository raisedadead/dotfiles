# Catppuccin Mocha palette
set -g @clr_rosewater "#f5e0dc"
set -g @clr_flamingo "#f2cdcd"
set -g @clr_pink "#f5c2e7"
set -g @clr_mauve "#cba6f7"
set -g @clr_red "#f38ba8"
set -g @clr_maroon "#eba0ac"
set -g @clr_peach "#fab387"
set -g @clr_yellow "#f9e2af"
set -g @clr_green "#a6e3a1"
set -g @clr_teal "#94e2d5"
set -g @clr_sky "#89dceb"
set -g @clr_sapphire "#74c7ec"
set -g @clr_blue "#89b4fa"
set -g @clr_lavender "#b4befe"
set -g @clr_text "#cdd6f4"
set -g @clr_subtext1 "#bac2de"
set -g @clr_subtext0 "#a6adc8"
set -g @clr_overlay2 "#9399b2"
set -g @clr_overlay1 "#7f849c"
set -g @clr_overlay0 "#6c7086"
set -g @clr_surface2 "#585b70"
set -g @clr_surface1 "#45475a"
set -g @clr_surface0 "#313244"
set -g @clr_base "#1e1e2e"
set -g @clr_mantle "#181825"
set -g @clr_crust "#11111b"

# Borders and messages
# Style options are format-expanded per-pane at draw time, so @clr_* resolves
# live without a shell fork, and pane-active-border-style can be a live format:
# mauve in copy-mode, red when synchronized, sapphire otherwise — no hook needed
# to recolour on mode/sync change (tmux redraws borders on those transitions).
set -g pane-border-style "fg=#{@clr_surface2}"
set -g pane-active-border-style "fg=#{?pane_in_mode,#{@clr_mauve},#{?pane_synchronized,#{@clr_red},#{@clr_sapphire}}}"
set -g window-style "fg=#{@clr_overlay1}"
set -g window-active-style "fg=#{@clr_text}"
set -g mode-style "bg=#{@clr_surface2},fg=#{@clr_text}"

# Reconcile each existing window's pane-border-status by pane count on reload
# (one fork, config-load only). Colour/lines are global now — nothing per-window
# to clear beyond the status row.
run-shell '
  for W in $(tmux list-windows -a -F "#{window_id}:#{window_panes}"); do
    ID="${W%%:*}"; P="${W##*:}"
    if [ "$P" -gt 1 ]; then tmux set -t "$ID" pane-border-status bottom; else tmux set -u -t "$ID" pane-border-status; fi
  done
'
set -g pane-border-indicators off
set -g pane-border-lines single
set -g pane-border-status off
set -g pane-border-format "#{?pane_in_mode,#[align=centre#,fg=#{@clr_base}#,bg=#{@clr_mauve}#,bold] 󰍽 #{scroll_position}/#{history_size} #[default],pane_synchronized,#[align=centre#,fg=#{@clr_base}#,bg=#{@clr_red}#,bold] 󰓦 #{b:pane_current_path} (#{?#{m/r:^(oh-my-posh|direnv|atuin|zoxide|fnm|wakatime),#{pane_current_command}},zsh,#{?#{m/r:^[0-9],#{pane_current_command}},claude,#{pane_current_command}}}) #[default],pane_active,#[align=centre#,fg=#{@clr_base}#,bg=#{@clr_sapphire}#,bold] #{b:pane_current_path} (#{?#{m/r:^(oh-my-posh|direnv|atuin|zoxide|fnm|wakatime),#{pane_current_command}},zsh,#{?#{m/r:^[0-9],#{pane_current_command}},claude,#{pane_current_command}}}) #[default],#[align=centre#,fg=#{@clr_base}#,bg=#{@clr_overlay1}#,bold] #{b:pane_current_path} (#{?#{m/r:^(oh-my-posh|direnv|atuin|zoxide|fnm|wakatime),#{pane_current_command}},zsh,#{?#{m/r:^[0-9],#{pane_current_command}},claude,#{pane_current_command}}}) #[default]}"
# Border colour/lines are global now; these hooks only flip the pane-border-status
# row so copy-mode/synchronized/multi-pane windows show it. bottom when in-mode OR
# synchronized OR >1 pane, else off. Kept shell-based (not `if -F`) because the
# format context of `run` tracks the hook's own window; `if -F` resolves against
# the client-current window and mis-targets on kill-pane.
set-hook -g pane-mode-changed "run 'W=#{window_id}; want=off; if [ #{pane_in_mode} -eq 1 ] || [ #{pane_synchronized} -eq 1 ] || [ #{window_panes} -gt 1 ]; then want=bottom; fi; tmux set -t \$W pane-border-status \$want'"
# No guard: setting pane-border-status does not re-fire this hook (verified, tmux
# 3.x — one fire per layout op), so the old show-options round-trip was dead weight.
set-hook -g window-layout-changed "run 'W=#{window_id}; want=off; [ #{window_panes} -gt 1 ] && want=bottom; tmux set -t \$W pane-border-status \$want'"
set -g popup-border-style fg=white
set -g popup-style default
set -g message-style bg=yellow,fg=black
set -g message-command-style bg=cyan,fg=black
set -g copy-mode-position-format ''

# Status bar — three-zone layout via status-format[0]
#
# Follows Catppuccin design: muted surfaces for zones, vibrant accents for small indicators.
#
# ┌─ left (surface0 bg) ───┬── centre (pill, surface1 bg) ────────────┬── right (surface0 bg) ─┐
# │  ●  ●  ●² (dots)     ╱ │  ( session // 1:win / 2:win  ← ◆ )       │ ╲  ■² ■  (squares)    │
# └─────────────────────────┴──────────────────────────────────────────┴────────────────────────┘
#
# Left zone (surface0 bg): window dots
#   Mauve=active, overlay2=inactive, superscript pane count (²-⁹) via multi-branch #?
#
# Centre zone (surface1 bg, rounded pill): session name // window names
#   Session: green icon (red when prefix). Windows: text=inactive, yellow=active
#   Separators (// and /): overlay0. Indicators: yellow ← zoom, ◆ prefix
#
# Right zone (surface0 bg): session squares (parked sessions hidden via @parked filter)
#   Green=attached, overlay2=other, superscript window count (²-⁹) via multi-branch #?
#
set -g status 2
set -g status-style bg=default,fg=brightblack
set -g status-format[1] ""
set -g status-format[0] "\
#[align=left]#[bg=#{@clr_surface0}] \
#{W:\
#[fg=#{@clr_overlay2}]●#{?#{==:#{window_panes},2},²,#{==:#{window_panes},3},³,#{==:#{window_panes},4},⁴,#{==:#{window_panes},5},⁵,#{==:#{window_panes},6},⁶,#{==:#{window_panes},7},⁷,#{==:#{window_panes},8},⁸,#{==:#{window_panes},9},⁹,#{>:#{window_panes},9},⁺, }\
,\
#[fg=#{@clr_mauve}]●#{?#{==:#{window_panes},2},²,#{==:#{window_panes},3},³,#{==:#{window_panes},4},⁴,#{==:#{window_panes},5},⁵,#{==:#{window_panes},6},⁶,#{==:#{window_panes},7},⁷,#{==:#{window_panes},8},⁸,#{==:#{window_panes},9},⁹,#{>:#{window_panes},9},⁺, }\
}\
#[fg=#{@clr_surface0}]#[bg=default]\
#[align=centre]\
#{?window_zoomed_flag,#[fg=#{@clr_yellow}]#[bg=default]#[bg=#{@clr_yellow}]#[fg=#{@clr_crust}]󰍉#[fg=#{@clr_yellow}]#[bg=default] ,}\
#[fg=#{@clr_surface1}]#[bg=default]#[bg=#{@clr_surface1}]\
#{?client_prefix,#[fg=#{@clr_red}],#[fg=#{@clr_green}]} #{session_name} \
#[fg=#{@clr_overlay0}]/\
#{W:\
#[fg=#{@clr_overlay0}]/ #[fg=#{@clr_text}]#{window_index}:#{window_name} \
,\
#[fg=#{@clr_overlay0}]/ #[fg=#{@clr_yellow}]#{window_index}:#{window_name} \
}\
#[fg=#{@clr_surface1}]#[bg=default]\
#{?client_prefix, #[fg=#{@clr_yellow}]#[bg=default]#[bg=#{@clr_yellow}]#[fg=#{@clr_crust}]󰌌#[fg=#{@clr_yellow}]#[bg=default],}\
#[align=right]\
#[fg=#{@clr_surface0}]#[bg=default]#[bg=#{@clr_surface0}] \
#{S:\
#{?#{==:#{@parked},1},,#[fg=#{@clr_overlay2}]■#{?#{==:#{session_windows},2},²,#{==:#{session_windows},3},³,#{==:#{session_windows},4},⁴,#{==:#{session_windows},5},⁵,#{==:#{session_windows},6},⁶,#{==:#{session_windows},7},⁷,#{==:#{session_windows},8},⁸,#{==:#{session_windows},9},⁹,#{>:#{session_windows},9},⁺, }}\
,\
#[fg=#{@clr_green}]■#{?#{==:#{session_windows},2},²,#{==:#{session_windows},3},³,#{==:#{session_windows},4},⁴,#{==:#{session_windows},5},⁵,#{==:#{session_windows},6},⁶,#{==:#{session_windows},7},⁷,#{==:#{session_windows},8},⁸,#{==:#{session_windows},9},⁹,#{>:#{session_windows},9},⁺, }\
}\
 "
