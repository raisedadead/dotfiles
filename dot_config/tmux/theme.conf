# Catppuccin Mocha palette
set -g @clr_rosewater "#f5e0dc"
set -g @clr_flamingo "#f2cdcd"
set -g @clr_pink "#f5c2e7"
set -g @clr_mauve "#cba6f7"
set -g @clr_red "#f38ba8"
set -g @clr_maroon "#eba0ac"
set -g @clr_peach "#fab387"
set -g @clr_yellow "#f9e2af"
set -g @clr_green "#a6e3a1"
set -g @clr_teal "#94e2d5"
set -g @clr_sky "#89dceb"
set -g @clr_sapphire "#74c7ec"
set -g @clr_blue "#89b4fa"
set -g @clr_lavender "#b4befe"
set -g @clr_text "#cdd6f4"
set -g @clr_subtext1 "#bac2de"
set -g @clr_subtext0 "#a6adc8"
set -g @clr_overlay2 "#9399b2"
set -g @clr_overlay1 "#7f849c"
set -g @clr_overlay0 "#6c7086"
set -g @clr_surface2 "#585b70"
set -g @clr_surface1 "#45475a"
set -g @clr_surface0 "#313244"
set -g @clr_base "#1e1e2e"
set -g @clr_mantle "#181825"
set -g @clr_crust "#11111b"

# Borders and messages
set -g pane-border-style fg=brightblack
set -g pane-border-indicators off
set -g pane-border-lines spaces
set -g pane-active-border-style fg=#f5e0dc
set -g pane-border-status off
set -g pane-border-format "#{?pane_in_mode,#[fg=#1E1E2E#,bg=#CBA6F7#,bold] у°ҚҪ #{scroll_position}/#{history_size} #[default],#{?pane_synchronized,#[fg=#1E1E2E#,bg=#F38BA8#,bold] у°“Ұ #[default],}}"
set-hook -g pane-mode-changed 'if -F "#{pane_in_mode}" "set pane-active-border-style fg=#CBA6F7 ; set pane-border-lines single ; set pane-border-status bottom" "if -F \"#{pane_synchronized}\" \"set pane-active-border-style fg=#F38BA8 ; set pane-border-status bottom\" \"set pane-active-border-style fg=white ; set pane-border-lines spaces ; set pane-border-status off\""'
set -g popup-border-style fg=white
set -g popup-style default
set -g message-style bg=yellow,fg=black
set -g message-command-style bg=cyan,fg=black
set -g mode-style bg=brightblack,fg=white
set -g copy-mode-position-format '#[fg=#1E1E2E,bg=#CBA6F7,bold] у°ҚҪ #{scroll_position}/#{history_size} '
set -g display-time 1500

# Status bar вҖ” three-zone layout via status-format[0]
#
# Follows Catppuccin design: muted surfaces for zones, vibrant accents for small indicators.
#
# в”Ңв”Җ left (surface0 bg) в”Җв”Җв”Җв”¬в”Җв”Җ centre (pill, surface1 bg) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җ right (surface0 bg) в”Җв”җ
# в”Ӯ  в—Ҹ  в—Ҹ  в—ҸВІ (dots)     в•ұ в”Ӯ  ( session // 1:win / 2:win  вҶҗ в—Ҷ )       в”Ӯ в•І  в– ВІ в–   (squares)    в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
# Left zone (surface0 bg): window dots
#   Mauve=active, overlay2=inactive, superscript pane count (ВІ-вҒ№) with static gap
#
# Centre zone (surface1 bg, rounded pill): session name // window names
#   Session: green icon (red when prefix). Windows: text=inactive, mauve=active
#   Separators (// and /): overlay0. Indicators: yellow вҶҗ zoom, в—Ҷ prefix
#
# Right zone (surface0 bg): session squares
#   Green=attached, overlay2=other, superscript window count (ВІ-вҒ№)
#
set -g status on
set -g status-style bg=default,fg=brightblack
set -g status-format[0] "\
#[align=left]#[bg=#{@clr_surface0}] \
#{W:\
#[fg=#{@clr_overlay2}]в—Ҹ#{?#{>:#{window_panes},1},#{?#{==:#{window_panes},2},ВІ,#{?#{==:#{window_panes},3},Ві,#{?#{==:#{window_panes},4},вҒҙ,#{?#{==:#{window_panes},5},вҒө,#{?#{==:#{window_panes},6},вҒ¶,#{?#{==:#{window_panes},7},вҒ·,#{?#{==:#{window_panes},8},вҒё,#{?#{==:#{window_panes},9},вҒ№,вҒә}}}}}}}}, }\
,\
#[fg=#{@clr_mauve}]в—Ҹ#{?#{>:#{window_panes},1},#{?#{==:#{window_panes},2},ВІ,#{?#{==:#{window_panes},3},Ві,#{?#{==:#{window_panes},4},вҒҙ,#{?#{==:#{window_panes},5},вҒө,#{?#{==:#{window_panes},6},вҒ¶,#{?#{==:#{window_panes},7},вҒ·,#{?#{==:#{window_panes},8},вҒё,#{?#{==:#{window_panes},9},вҒ№,вҒә}}}}}}}}, }\
}\
#[fg=#{@clr_surface0}]#[bg=default]оӮё\
#[align=centre]\
#{?window_zoomed_flag,#[fg=#{@clr_yellow}]#[bg=default]оӮ¶#[bg=#{@clr_yellow}]#[fg=#{@clr_crust}]у°Қү#[fg=#{@clr_yellow}]#[bg=default]оӮҙ ,}\
#[fg=#{@clr_surface1}]#[bg=default]оӮ¶#[bg=#{@clr_surface1}]\
#{?client_prefix,#[fg=#{@clr_red}],#[fg=#{@clr_green}]} #{session_name} \
#[fg=#{@clr_overlay0}]/\
#{W:\
#[fg=#{@clr_overlay0}]/ #[fg=#{@clr_text}]#{window_index}:#{window_name} \
,\
#[fg=#{@clr_overlay0}]/ #[fg=#{@clr_yellow}]#{window_index}:#{window_name} \
}\
#[fg=#{@clr_surface1}]#[bg=default]оӮҙ\
#{?client_prefix, #[fg=#{@clr_yellow}]#[bg=default]оӮ¶#[bg=#{@clr_yellow}]#[fg=#{@clr_crust}]у°ҢҢ#[fg=#{@clr_yellow}]#[bg=default]оӮҙ,}\
#[align=right]\
#[fg=#{@clr_surface0}]#[bg=default]оӮә#[bg=#{@clr_surface0}] \
#{S:\
#[fg=#{@clr_overlay2}]в– #{?#{>:#{session_windows},1},#{?#{==:#{session_windows},2},ВІ,#{?#{==:#{session_windows},3},Ві,#{?#{==:#{session_windows},4},вҒҙ,#{?#{==:#{session_windows},5},вҒө,#{?#{==:#{session_windows},6},вҒ¶,#{?#{==:#{session_windows},7},вҒ·,#{?#{==:#{session_windows},8},вҒё,#{?#{==:#{session_windows},9},вҒ№,вҒә}}}}}}}}, }\
,\
#[fg=#{@clr_green}]в– #{?#{>:#{session_windows},1},#{?#{==:#{session_windows},2},ВІ,#{?#{==:#{session_windows},3},Ві,#{?#{==:#{session_windows},4},вҒҙ,#{?#{==:#{session_windows},5},вҒө,#{?#{==:#{session_windows},6},вҒ¶,#{?#{==:#{session_windows},7},вҒ·,#{?#{==:#{session_windows},8},вҒё,#{?#{==:#{session_windows},9},вҒ№,вҒә}}}}}}}}, }\
}\
 "
