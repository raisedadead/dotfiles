# Borders and messages
set -g pane-border-style fg=brightblack
set -g pane-border-indicators off
set -g pane-border-lines spaces
set -g pane-active-border-style fg=#f5e0dc
set -g pane-border-status off
set -g pane-border-format "#{?pane_in_mode,#[fg=#1E1E2E#,bg=#CBA6F7#,bold] у°ҚҪ #{scroll_position}/#{history_size} #[default],#{?pane_synchronized,#[fg=#1E1E2E#,bg=#F38BA8#,bold] у°“Ұ #[default],}}"
set-hook -g pane-mode-changed 'if -F "#{pane_in_mode}" "set pane-active-border-style fg=#CBA6F7 ; set pane-border-status bottom" "if -F \"#{pane_synchronized}\" \"set pane-active-border-style fg=#F38BA8 ; set pane-border-status bottom\" \"set pane-active-border-style fg=white ; set pane-border-status off\""'
set -g popup-border-style fg=white
set -g popup-style default
set -g message-style bg=yellow,fg=black
set -g message-command-style bg=cyan,fg=black
set -g mode-style bg=brightblack,fg=white
set -g copy-mode-position-format '#[fg=#1E1E2E,bg=#CBA6F7,bold] у°ҚҪ #{scroll_position}/#{history_size} '
set -g display-time 1500

# Status bar вҖ” three-zone slant layout via status-format[0]
#
# в”Ңв”Җ left (surface0 bg) в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”¬в”Җв”Җ centre (pill) в”Җв”Җв”¬в”Җв”Җ right (surface0 bg) в”Җв”җ
# в”Ӯ  в—Ҹ 1:zsh  в—Ҹ 2:vim  в—Ҹ 3:node  вҶҗ в—Ҷ  в•ұ в”Ӯ  ( session )      в”Ӯ в•І  в– вҒҝ squares          в”Ӯ
# в””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҙв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ
#
# Slant separators: U+E0B8 after left, U+E0BA before right
# Pill separators: U+E0B6 left edge, U+E0B4 right edge
# Background: #45475A (Catppuccin Mocha surface1) for zones
#
# Left zone: window dots + names on surface0
#   Dot colors: peach(#FAB387)=active, brightyellow=bell, red=error, blue=activity, brightblack=idle
#   Superscript pane count (ВІ-вҒ№) when window has >= 2 panes
#   Name: peach(#FAB387)=active, brightblack=inactive
#   Trailing indicators: вҶҗ yellow when zoomed, в—Ҷ yellow when prefix active
#
# Centre zone: session name in rounded pill
#   Magenta text on surface0 bg, rounded separators
#
# Right zone: session squares on surface0
#   Colors: green=attached, brightblack=other
#   Superscript window count (ВІ-вҒ№) when session has >= 2 windows
#
set -g status 2
set -g status-style bg=default,fg=brightblack
set -g status-format[0] "\
#[align=left]#[bg=#45475A] \
#{W:\
#{?window_bell_flag,#[fg=brightyellow],\
#{?#{&&:#{@last_exit_code},#{!=:#{@last_exit_code},0}},#[fg=red],#{?window_activity_flag,#[fg=blue],#[fg=#A6ADC8]}\
}}в—Ҹ\
