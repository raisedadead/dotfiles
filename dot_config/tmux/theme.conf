#{?#{==:#{window_panes},8},вҒё,\
#{?#{==:#{window_panes},9},вҒ№,\
вҒә}}}}}}}},}\
 #[fg=#A6ADC8]#{window_index}:#{window_name} \
,\
#[fg=#FAB387]в—Ҹ\
#{?#{>:#{window_panes},1},\
#{?#{==:#{window_panes},2},ВІ,\
