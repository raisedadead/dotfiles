# Toggle copy mode
bind -n M-v if -F "#{pane_in_mode}" "send-keys -X cancel" "copy-mode"

# Vi selection
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
# y → handled by tmux-yank plugin (copy-pipe-and-cancel pbcopy)

# Pane navigation (smart-splits)
bind -T copy-mode-vi C-M-h select-pane -L
bind -T copy-mode-vi C-M-j select-pane -D
bind -T copy-mode-vi C-M-k select-pane -U
bind -T copy-mode-vi C-M-l select-pane -R

# Mouse: pane-aware selection, copies to system clipboard via OSC 52
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word \; run-shell -d 0.3 \; send-keys -X copy-selection
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line \; run-shell -d 0.3 \; send-keys -X copy-selection

# Scroll: auto-exit copy mode when reaching bottom
bind -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down \; if -F "#{scroll_position}" "" "send-keys -X cancel"
