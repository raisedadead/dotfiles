# Terminal
set -sg terminal-overrides ",*:RGB"
set -as terminal-features ",xterm-ghostty:hyperlinks"
set -as terminal-features ",xterm-ghostty:clipboard"
set -as terminal-features ",xterm-ghostty:extkeys"
set -g extended-keys on
set -g allow-passthrough on

# Behaviour
set -g escape-time 0
set -g repeat-time 500
set -g focus-events on
set -g history-limit 100000
set -g display-time 1500
set -g status-interval 5
set -g mouse on
set -g detach-on-destroy off
set -gw mode-keys vi

# Windows
set -g base-index 1
set -g pane-base-index 1
set -g automatic-rename on
set -g automatic-rename-format "#{?pane_in_mode,[tmux],#{?#{m/r:^[0-9],#{pane_current_command}},claude,#{pane_current_command}}}#{?pane_dead,[dead],}"
set -g renumber-windows on
set -g status-position top

# Monitoring
set -g monitor-bell on
set -g bell-action other
set -g monitor-activity on
set -g activity-action other

# Prefix
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix
bind C-b send-prefix -2

# Modular configs
source-file ~/.config/tmux/keybinds.conf
source-file ~/.config/tmux/copy-mode.conf
source-file ~/.config/tmux/theme.conf

# Plugins
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_with_mouse off

set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-fzf-options '-p 53%,60% --border rounded --border-label=" URLs " --padding=1,2 --color=bg+:#313244,bg:#1E1E2E,spinner:#F5E0DC,hl:#F38BA8,fg:#CDD6F4,header:#F38BA8,info:#CBA6F7,pointer:#F5E0DC,marker:#B4BEFE,fg+:#CDD6F4,prompt:#CBA6F7,hl+:#F38BA8,selected-bg:#45475A,border:#6C7086,label:#CDD6F4'
set -g @fzf-url-history-limit '2000'
set -g @fzf-url-open 'open'

# Auto-reload config on new session (replaces tmux-autoreload — BSD realpath incompatible)
set-hook -g session-created "source-file ~/.config/tmux/tmux.conf"

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

set -g @plugin 'tmux-plugins/tpm'
run '~/.config/tmux/plugins/tpm/tpm'
