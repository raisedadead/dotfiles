# Terminal
set -sg terminal-overrides ",*:RGB"
# Reset terminal-features to defaults before appending (prevents duplicates
# when config is re-sourced via session-created hook or prefix+r).
# extkeys intentionally omitted — Ghostty 1.3.0+ (#9406) drops the Shift
# modifier for Option-modified keys in modifyOtherKeys mode 2, breaking
# M-S-* bindings. Legacy encoding preserves case (M-d vs M-D), so dual
# bindings in keybinds.conf cover both encoding modes.
set -su terminal-features
set -as terminal-features "xterm-ghostty:hyperlinks:clipboard"
set -g extended-keys on
set -g allow-passthrough on
set -g extended-keys-format csi-u
# yazi-rs.github.io/docs/image-preview (tmux section): keep TERM/
# TERM_PROGRAM fresh for nested terminal detection.
# Reset first — -ga would duplicate entries on every re-source.
set -gu update-environment
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Behaviour
set -g escape-time 0
set -g repeat-time 500
set -g focus-events on
set -g history-limit 100000
set -g display-time 1500
set -g status-interval 5
set -g mouse on
set -g detach-on-destroy off
set -gw mode-keys vi

# Windows
set -g base-index 1
set -g pane-base-index 1
set -g automatic-rename on
# Transient prompt/shell helpers (oh-my-posh, direnv, atuin, zoxide, fnm, wakatime)
# briefly become pane_current_command during shell init and each precmd. Map them
# to "zsh" so tmux does not flicker the window name through them; real commands
# (nvim, claude, git) still show.
set -g automatic-rename-format "#{?pane_in_mode,[tmux],#{?#{m/r:^(oh-my-posh|direnv|atuin|zoxide|fnm|wakatime),#{pane_current_command}},zsh,#{?#{m/r:^[0-9],#{pane_current_command}},claude,#{pane_current_command}}}}#{?pane_dead,[dead],}"
set -g renumber-windows on
set -g status-position top

# First window of every new session = "Main". rename-window flips
# automatic-rename off for that window only, so window :1 stays "Main"
# while windows 2+ keep the format above (tracks pane_current_command).
set-hook -g session-created 'rename-window -t "{start}" Main'

# Monitoring
set -g monitor-bell on
set -g bell-action other
set -g monitor-activity on
set -g activity-action other

# Prefix
set -g prefix C-Space
bind C-Space send-prefix

# Modular configs
source-file ~/.config/tmux/keybinds.conf
source-file ~/.config/tmux/copy-mode.conf
source-file ~/.config/tmux/theme.conf

# Plugins
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_with_mouse off

set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-fzf-options '-p 53%,60% --border rounded --border-label=" URLs " --padding=1,2 --color=bg+:#313244,bg:#1E1E2E,spinner:#F5E0DC,hl:#F38BA8,fg:#CDD6F4,header:#F38BA8,info:#CBA6F7,pointer:#F5E0DC,marker:#B4BEFE,fg+:#CDD6F4,prompt:#CBA6F7,hl+:#F38BA8,selected-bg:#45475A,border:#6C7086,label:#CDD6F4'
set -g @fzf-url-history-limit '2000'
set -g @fzf-url-open 'open'

set -g @plugin 'tmux-plugins/tpm'
run '~/.config/tmux/plugins/tpm/tpm'
