# Unbind defaults that conflict with custom bindings or cause accidental triggers.
# Re-enable any by removing the unbind line and reloading (prefix+r).
#
# Dangerous: prefix + Space double-tap fires next-layout
unbind Space
#
# Repeatable arrow defaults extend the prefix intercept window (ghost inputs)
unbind Up           # select-pane -U      → use prefix+k
unbind Down         # select-pane -D      → use prefix+j
unbind Left         # select-pane -L      → use prefix+h
unbind Right        # select-pane -R      → use prefix+l
unbind M-Up         # resize-pane -U 5    → use prefix+K
unbind M-Down       # resize-pane -D 5    → use prefix+J
unbind M-Left       # resize-pane -L 5    → use prefix+H
unbind M-Right      # resize-pane -R 5    → use prefix+L
unbind C-Up         # resize-pane -U 1    → use prefix+K
unbind C-Down       # resize-pane -D 1    → use prefix+J
unbind C-Left       # resize-pane -L 1    → use prefix+H
unbind C-Right      # resize-pane -R 1    → use prefix+L
unbind S-Up         # refresh-client -U 10
unbind S-Down       # refresh-client -D 10
unbind S-Left       # refresh-client -L 10
unbind S-Right      # refresh-client -R 10
unbind DC           # refresh-client -c
#
# Duplicates replaced by custom root (Alt) or prefix bindings
unbind '"'          # split-window        → prefix+- or M-S-D/M-D
unbind %            # split-window -h     → prefix+| or M-d
unbind z            # resize-pane -Z      → prefix+f or M-S-Enter
unbind n            # next-window         → M-`
unbind p            # previous-window     → M-S-~/M-~
unbind '['          # copy-mode           → M-v
unbind ','          # rename-window       → M-R
unbind '$'          # rename-session      → M-S-R
unbind '('          # switch-client -p    → M-BTab
unbind ')'          # switch-client -n    → M-Tab
unbind 0            # select-window :=0   → unused (base-index is 1)
unbind '!'          # break-pane          → M-\ → 2

# Seamless navigation: neovim splits + tmux panes (via smart-splits.nvim)
# When @pane-is-vim is set, forward keys to neovim; otherwise tmux handles them
bind-key -n C-M-h if -F "#{@pane-is-vim}" "send-keys C-M-h" "select-pane -L"
bind-key -n C-M-j if -F "#{@pane-is-vim}" "send-keys C-M-j" "select-pane -D"
bind-key -n C-M-k if -F "#{@pane-is-vim}" "send-keys C-M-k" "select-pane -U"
bind-key -n C-M-l if -F "#{@pane-is-vim}" "send-keys C-M-l" "select-pane -R"

# Pane navigation (prefix fallback)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (prefix, repeatable)
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Splits and windows (prefix-free)
#
# Dual bindings: M-S-X (CSI u / extended-keys) + M-X (legacy encoding).
# Alt+Shift+D sends \eD (legacy) or \e[68;4u (CSI u) depending on terminal
# mode. tmux matches M-D for the former, M-S-D for the latter. Binding both
# ensures the key works regardless of encoding mode, Ghostty version, or
# whether an inner app has requested extended keys.
# See: Ghostty #9406 (Option encoding in modifyOtherKeys mode 2)
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-S-D split-window -v -c "#{pane_current_path}"
bind -n M-D   split-window -v -c "#{pane_current_path}"
bind -n M-m display-popup -E -w 20% -h 5 -b rounded -T '#[align=centre] New Window ' "~/.config/tmux/scripts/new-window-popup.sh"
bind -n M-S-Enter resize-pane -Z

# Splits (prefix, preserve cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Equalize layouts (prefix only)
bind e select-layout even-vertical
bind E select-layout even-horizontal

# Window cycling (dual: CSI u + legacy — see splits comment above)
bind -n M-` next-window
bind -n M-S-~ previous-window
bind -n M-~   previous-window

# Rename (prefix-free, popup; dual: CSI u + legacy — see splits comment above)
bind -n M-r display-popup -E -w 20% -h 5 -b rounded -T '#[align=centre] Rename Session ' "~/.config/tmux/scripts/rename-popup.sh session"
bind -n M-S-R display-popup -E -w 20% -h 5 -b rounded -T '#[align=centre] Rename Window ' "~/.config/tmux/scripts/rename-popup.sh window"
bind -n M-R   display-popup -E -w 20% -h 5 -b rounded -T '#[align=centre] Rename Window ' "~/.config/tmux/scripts/rename-popup.sh window"

# Direct window access (Alt+1..9)
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Actions
bind x confirm-before -y -p "Kill pane? (Enter/n)" kill-pane
bind f resize-pane -Z
# Sync-panes toggle delegates to a script so the border colour reflects
# the POST-toggle state. Inline `setw ... \; run '... #{pane_synchronized} ...'`
# fails because tmux format-expands the whole command list at parse time,
# before `setw` has flipped the option (red stays after toggling off).
bind i run-shell "~/.config/tmux/scripts/toggle-sync-panes.sh '#{window_id}' '#{@clr_red}' '#{@clr_sapphire}'"
bind r source-file ~/.config/tmux/tmux.conf \; display 'Tmux config reloaded'

# SimpleMenu (fzf-powered switcher)
bind -n M-o run-shell "$HOME/.config/tmux/scripts/switcher.sh || true"
bind -n M-Tab run-shell "$HOME/.config/tmux/scripts/cycle-session.sh -n"
bind -n M-BTab run-shell "$HOME/.config/tmux/scripts/cycle-session.sh -p"
bind -n M-n display-popup -E -w 20% -h 5 -b rounded -T '#[align=centre] New Session ' "~/.config/tmux/scripts/new-session-popup.sh"

# Tree view (sessions + windows)
bind -n M-w choose-tree -Zw -F "#{?pane_format,#{pane_current_command} #{pane_current_path},#{?window_format,#{window_name} (#{window_panes} panes),#{session_name} (#{session_windows} win)}}"

# Popups
bind -n M-s run-shell "$HOME/.config/tmux/scripts/session-menu.sh || true"
bind -n M-t display-popup -E -w 70% -h 80% -b rounded -T '#[align=centre] Scratch ' -d "#{pane_current_path}"
bind -n M-g display-popup -E -w 70% -h 80% -b rounded -T '#[align=centre] Lazygit ' -d "#{pane_current_path}" lazygit
bind -n M-h display-popup -E -w 90% -h 90% -b rounded -T '#[align=centre]  GH Dashboard ' -d "#{pane_current_path}" "gh dash"
bind -n M-p run-shell "$HOME/.config/tmux/scripts/park-session.sh || true"
bind -n M-u run-shell "$HOME/.config/tmux/scripts/unpark-session.sh || true"
# URL Picker entry below invokes tmux-fzf-url plugin internals (fzf-url.sh argv).
# Plugin also auto-binds `prefix u` for the same picker — more discoverable.
bind -n 'M-\' display-menu -T '#[align=centre] Commands ' \
  -b rounded \
  -s 'fg=#cdd6f4,bg=#1e1e2e' \
  -S 'fg=#6c7086' \
  -H 'fg=#1e1e2e,bg=#cba6f7,bold' \
  -x C -y C \
  "Sync Panes"           1 "run-shell '~/.config/tmux/scripts/toggle-sync-panes.sh \"#{window_id}\" \"#{@clr_red}\" \"#{@clr_sapphire}\"'" \
  "Break to Window"      2 "break-pane" \
  "Break to Session"     3 "display-popup -E -w 20% -h 5 -b rounded -T '#[align=centre] Break to Session ' '~/.config/tmux/scripts/break-pane-to-session-popup.sh'" \
  "Equalize Vertical"    4 "select-layout even-vertical" \
  "Equalize Horizontal"  5 "select-layout even-horizontal" \
  "Save Session"         6 "run-shell '~/.config/tmux/scripts/save-session.sh || true'" \
  "Scratch Terminal"     7 "display-popup -E -w 70% -h 80% -b rounded -T '#[align=centre] Scratch ' -d '#{pane_current_path}'" \
  "GH Dashboard"         8 "display-popup -E -w 90% -h 90% -b rounded -T '#[align=centre]  GH Dashboard ' -d '#{pane_current_path}' 'gh dash'" \
  "" \
  "URL Picker"           0 "run-shell -b '~/.config/tmux/plugins/tmux-fzf-url/fzf-url.sh \"\" 2000 \"open\" \"\"'" \
  "New Window"           w "new-window -c '#{pane_current_path}'" \
  "Last Session"         l "switch-client -l" \
  "" \
  "Command Prompt"       : "command-prompt" \
  "Keybindings"          ? "run-shell '~/.config/tmux/scripts/keyb-popup.sh || true'"
