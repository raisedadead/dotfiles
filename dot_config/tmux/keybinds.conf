# Unbind defaults that conflict with custom bindings or cause accidental triggers.
# Re-enable any by removing the unbind line and reloading (prefix+r).
#
# Dangerous: C-Space prefix + Space double-tap fires next-layout
unbind Space
#
# Repeatable arrow defaults extend the prefix intercept window (ghost inputs)
unbind Up           # select-pane -U      → use prefix+k
unbind Down         # select-pane -D      → use prefix+j
unbind Left         # select-pane -L      → use prefix+h
unbind Right        # select-pane -R      → use prefix+l
unbind M-Up         # resize-pane -U 5    → use prefix+K
unbind M-Down       # resize-pane -D 5    → use prefix+J
unbind M-Left       # resize-pane -L 5    → use prefix+H
unbind M-Right      # resize-pane -R 5    → use prefix+L
unbind C-Up         # resize-pane -U 1    → use prefix+K
unbind C-Down       # resize-pane -D 1    → use prefix+J
unbind C-Left       # resize-pane -L 1    → use prefix+H
unbind C-Right      # resize-pane -R 1    → use prefix+L
unbind S-Up         # refresh-client -U 10
unbind S-Down       # refresh-client -D 10
unbind S-Left       # refresh-client -L 10
unbind S-Right      # refresh-client -R 10
unbind DC           # refresh-client -c
#
# Duplicates replaced by custom root (Alt) or prefix bindings
unbind '"'          # split-window        → prefix+- or M-S-D
unbind %            # split-window -h     → prefix+| or M-d
unbind z            # resize-pane -Z      → prefix+f or M-S-Enter
unbind n            # next-window         → M-`
unbind p            # previous-window     → M-S-~
unbind '['          # copy-mode           → M-v
unbind ','          # rename-window       → M-R
unbind '$'          # rename-session      → M-S-R
unbind '('          # switch-client -p    → M-BTab
unbind ')'          # switch-client -n    → M-Tab
unbind 0            # select-window :=0   → unused (base-index is 1)

# Seamless navigation: neovim splits + tmux panes (via smart-splits.nvim)
# When @pane-is-vim is set, forward keys to neovim; otherwise tmux handles them
bind-key -n C-M-h if -F "#{@pane-is-vim}" "send-keys C-M-h" "select-pane -L"
bind-key -n C-M-j if -F "#{@pane-is-vim}" "send-keys C-M-j" "select-pane -D"
bind-key -n C-M-k if -F "#{@pane-is-vim}" "send-keys C-M-k" "select-pane -U"
bind-key -n C-M-l if -F "#{@pane-is-vim}" "send-keys C-M-l" "select-pane -R"

# Pane navigation (prefix fallback)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (prefix, repeatable)
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Splits and windows (prefix-free)
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-S-D split-window -v -c "#{pane_current_path}"
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-S-Enter resize-pane -Z

# Splits (prefix, preserve cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Equalize layouts (prefix only)
bind e select-layout even-vertical
bind E select-layout even-horizontal

# Window cycling
bind -n M-` next-window
bind -n M-S-~ previous-window

# Rename (prefix-free, popup)
bind -n M-r display-popup -E -w 20% -h 5 -b rounded -T '#[align=centre] Rename Session ' "~/.config/tmux/scripts/rename-popup.sh session"
bind -n M-S-R display-popup -E -w 20% -h 5 -b rounded -T '#[align=centre] Rename Window ' "~/.config/tmux/scripts/rename-popup.sh window"

# Direct window access (Alt+1..9)
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Actions
bind x kill-pane
bind f resize-pane -Z
bind i setw synchronize-panes \; if -F "#{pane_synchronized}" "set pane-active-border-style fg=#F38BA8 ; set pane-border-status bottom" "set pane-active-border-style fg=white ; set pane-border-status off"
bind @ command-prompt -p "Break to session:" "run-shell \"$HOME/.config/tmux/scripts/break-pane-to-session.sh '#{pane_id}' '#{pane_current_path}' '%%'\""
bind r source-file ~/.config/tmux/tmux.conf \; display 'Tmux config reloaded'

# SimpleMenu (fzf-powered switcher)
bind -n M-o run-shell "$HOME/.config/tmux/scripts/switcher.sh || true"
bind -n M-Tab switch-client -n
bind -n M-BTab switch-client -p
bind -n M-n display-popup -E -w 20% -h 5 -b rounded -T '#[align=centre] New Session ' "~/.config/tmux/scripts/new-session-popup.sh"
bind S switch-client -l

# Tree view (sessions + windows)
bind -n M-w choose-tree -Zw -F "#{?pane_format,#{pane_current_command} #{pane_current_path},#{?window_format,#{window_name} (#{window_panes} panes),#{session_name} (#{session_windows} win)}}"

# Popups
bind -n M-g display-popup -E -w 70% -h 80% -b rounded -T '#[align=centre] Lazygit ' -d "#{pane_current_path}" lazygit
bind -n M-S-? run-shell "~/.config/tmux/scripts/keyb-popup.sh || true"
bind -n M-p run-shell "~/.config/tmux/scripts/command-palette.sh || true"
