config-version = 2

after-startup-command = [
  'exec-and-forget /opt/homebrew/bin/sketchybar',
  'exec-and-forget /opt/homebrew/bin/borders active_color=0xffcba6f7 inactive_color=0xff585b70 width=5.0 style=round hidpi=on',
]

exec-on-workspace-change = [
  '/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 0
default-root-container-layout = 'accordion'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
automatically-unhide-macos-hidden-apps = false

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.right = 8
outer.bottom = 46
outer.top = 8

[mode.main.binding]
cmd-ctrl-h = 'focus left'
cmd-ctrl-j = 'focus down'
cmd-ctrl-k = 'focus up'
cmd-ctrl-l = 'focus right'

cmd-ctrl-shift-h = 'move left'
cmd-ctrl-shift-j = 'move down'
cmd-ctrl-shift-k = 'move up'
cmd-ctrl-shift-l = 'move right'

cmd-ctrl-1 = 'workspace 1'
cmd-ctrl-2 = 'workspace 2'
cmd-ctrl-3 = 'workspace 3'
cmd-ctrl-4 = 'workspace 4'
cmd-ctrl-5 = 'workspace 5'
cmd-ctrl-6 = 'workspace 6'

cmd-ctrl-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
cmd-ctrl-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
cmd-ctrl-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
cmd-ctrl-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
cmd-ctrl-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'
cmd-ctrl-shift-6 = 'move-node-to-workspace 6 --focus-follows-window'

cmd-ctrl-tab = 'workspace-back-and-forth'
cmd-ctrl-leftSquareBracket = 'workspace prev'
cmd-ctrl-rightSquareBracket = 'workspace next'
cmd-ctrl-m = 'fullscreen'
cmd-ctrl-t = 'layout tiles accordion'
cmd-ctrl-c = 'exec-and-forget ~/.config/aerospace/scripts/center-window.sh'
cmd-ctrl-minus = 'resize smart -50'
cmd-ctrl-equal = 'resize smart +50'
cmd-ctrl-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']

minus = 'resize smart -50'
equal = 'resize smart +50'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = ['layout floating', 'exec-and-forget ~/.config/aerospace/scripts/center-window.sh']

[[on-window-detected]]
if.app-id = 'com.apple.SystemPreferences'
run = ['layout floating', 'exec-and-forget ~/.config/aerospace/scripts/center-window.sh']

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run = ['layout floating', 'exec-and-forget ~/.config/aerospace/scripts/center-window.sh']

[[on-window-detected]]
if.app-id = 'com.apple.ActivityMonitor'
run = ['layout floating', 'exec-and-forget ~/.config/aerospace/scripts/center-window.sh']

[[on-window-detected]]
if.app-id = 'com.apple.finder'
if.window-title-regex-substring = 'Info|Copy|Move|Delete'
run = ['layout floating', 'exec-and-forget ~/.config/aerospace/scripts/center-window.sh']

[[on-window-detected]]
if.app-id = 'us.zoom.xos'
run = ['layout floating', 'exec-and-forget ~/.config/aerospace/scripts/center-window.sh']

[[on-window-detected]]
if.app-id = 'com.1password.1password'
if.window-title-regex-substring = 'Quick Access'
run = ['layout floating', 'exec-and-forget ~/.config/aerospace/scripts/center-window.sh']

[[on-window-detected]]
if.app-id = 'net.imput.helium'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if.app-id = 'com.readdle.SparkDesktop'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = 'move-node-to-workspace 5'

[[on-window-detected]]
if.app-name-regex-substring = 'Google Chat|Discord'
run = 'move-node-to-workspace 4'

[[on-window-detected]]
if.app-name-regex-substring = '.*'
run = 'move-node-to-workspace 1'
