config-version = 2

after-startup-command = [
  'exec-and-forget /opt/homebrew/bin/sketchybar',
  'exec-and-forget /opt/homebrew/bin/borders',
]

exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
accordion-padding = 0
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-mode-changed = [
  'exec-and-forget /bin/bash -c "/opt/homebrew/bin/sketchybar --trigger aerospace_mode_change MODE=$(/opt/homebrew/bin/aerospace list-modes --current)"',
]
automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ['1', '2', '3', '4', '5']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 12
inner.vertical = 12
outer.left = 12
outer.right = 12
outer.top = 12
outer.bottom = 60

[mode.main.binding]
# Disable macOS hide: aerospace moves workspace-inactive windows off-screen
# instead of hiding; cmd-h breaks that bookkeeping.
# https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
cmd-h = []
cmd-alt-h = []

cmd-ctrl-h = 'focus left'
cmd-ctrl-j = 'focus down'
cmd-ctrl-k = 'focus up'
cmd-ctrl-l = 'focus right'

cmd-ctrl-shift-h = 'move left'
cmd-ctrl-shift-j = 'move down'
cmd-ctrl-shift-k = 'move up'
cmd-ctrl-shift-l = 'move right'

cmd-ctrl-1 = 'workspace 1'
cmd-ctrl-2 = 'workspace 2'
cmd-ctrl-3 = 'workspace 3'
cmd-ctrl-4 = 'workspace 4'
cmd-ctrl-5 = 'workspace 5'

cmd-ctrl-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
cmd-ctrl-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
cmd-ctrl-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
cmd-ctrl-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
cmd-ctrl-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'

cmd-ctrl-tab = 'workspace-back-and-forth'
cmd-ctrl-leftSquareBracket = 'workspace prev'
cmd-ctrl-rightSquareBracket = 'workspace next'
cmd-ctrl-m = 'fullscreen'
cmd-ctrl-t = 'layout tiles accordion'
cmd-ctrl-f = 'layout floating tiling'
cmd-ctrl-c = 'exec-and-forget ~/.config/aerospace/scripts/size-cycle.sh'
cmd-ctrl-minus = 'resize smart -50'
cmd-ctrl-equal = 'resize smart +50'
cmd-ctrl-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']

minus = 'resize smart -50'
equal = 'resize smart +50'

[[on-window-detected]]
if = '''
test %{app-bundle-id} = com.apple.systempreferences \
  || test %{app-bundle-id} = com.apple.calculator \
  || test %{app-bundle-id} = com.apple.ActivityMonitor \
  || test %{app-bundle-id} = com.apple.finder \
  || test %{app-bundle-id} = com.1password.1password
'''
run = [
  'layout floating',
  'exec-and-forget ~/.config/aerospace/scripts/center-window.sh',
]

# Menu-bar popover apps: float in place so the catch-all rule can't yank them
# to workspace 1 on every click. No centering — keep them under their anchor.
[[on-window-detected]]
if = 'test %{app-bundle-id} = com.sindresorhus.Dato'
run = 'layout floating'

[[on-window-detected]]
if = 'test %{app-bundle-id} = net.imput.helium'
run = 'move-node-to-workspace 2'

[[on-window-detected]]
if = '''
test %{app-bundle-id} = com.mitchellh.ghostty \
  || test %{app-bundle-id} = com.microsoft.VSCode
'''
run = 'move-node-to-workspace 3'

[[on-window-detected]]
if = '''
test %{app-bundle-id} = com.readdle.SparkDesktop \
  || test %{app-bundle-id} = com.spotify.client
'''
run = 'move-node-to-workspace 4'

# Startup-only catch-all: gather any unassigned window into workspace 1 when
# AeroSpace launches. Post-startup, unmatched windows stay on the current
# workspace (no yank on menu-bar clicks, dialogs, transient panels).
[[on-window-detected]]
if.during-aerospace-startup = true
run = 'move-node-to-workspace 1'
