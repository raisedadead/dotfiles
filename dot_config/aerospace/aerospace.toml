config-version = 2

after-startup-command = [
  'exec-and-forget /opt/homebrew/bin/sketchybar',
  'exec-and-forget /opt/homebrew/bin/borders',
]

exec-on-workspace-change = [
  '/bin/bash',
  '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE',
]

start-at-login = true
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']
on-mode-changed = [
  'exec-and-forget /bin/bash -c "/opt/homebrew/bin/sketchybar --trigger aerospace_mode_change MODE=$(/opt/homebrew/bin/aerospace list-modes --current)"',
]
automatically-unhide-macos-hidden-apps = false

persistent-workspaces = ['1', '2', '3', '4', '5']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 12
inner.vertical = 12
outer.left = 12
outer.right = 12
outer.top = 12
outer.bottom = 60

[mode.main.binding]
# Disable macOS hide: aerospace moves workspace-inactive windows off-screen
# instead of hiding; cmd-h breaks that bookkeeping.
# https://nikitabobko.github.io/AeroSpace/goodies#disable-hide-app
cmd-h = []
cmd-alt-h = []

ctrl-alt-h = 'focus left'
ctrl-alt-j = 'focus down'
ctrl-alt-k = 'focus up'
ctrl-alt-l = 'focus right'
ctrl-alt-left = 'focus left'
ctrl-alt-down = 'focus down'
ctrl-alt-up = 'focus up'
ctrl-alt-right = 'focus right'

ctrl-alt-shift-h = 'move left'
ctrl-alt-shift-j = 'move down'
ctrl-alt-shift-k = 'move up'
ctrl-alt-shift-l = 'move right'
ctrl-alt-shift-left = 'move left'
ctrl-alt-shift-down = 'move down'
ctrl-alt-shift-up = 'move up'
ctrl-alt-shift-right = 'move right'

ctrl-alt-1 = 'workspace 1'
ctrl-alt-2 = 'workspace 2'
ctrl-alt-3 = 'workspace 3'
ctrl-alt-4 = 'workspace 4'
ctrl-alt-5 = 'workspace 5'

ctrl-alt-shift-1 = 'move-node-to-workspace 1 --focus-follows-window'
ctrl-alt-shift-2 = 'move-node-to-workspace 2 --focus-follows-window'
ctrl-alt-shift-3 = 'move-node-to-workspace 3 --focus-follows-window'
ctrl-alt-shift-4 = 'move-node-to-workspace 4 --focus-follows-window'
ctrl-alt-shift-5 = 'move-node-to-workspace 5 --focus-follows-window'

ctrl-alt-tab = 'workspace-back-and-forth'
ctrl-alt-leftSquareBracket = 'workspace prev'
ctrl-alt-rightSquareBracket = 'workspace next'
ctrl-alt-enter = 'fullscreen'
ctrl-alt-c = [
  'layout floating',
  'exec-and-forget ~/.config/aerospace/scripts/center-window.sh',
]
ctrl-alt-f = 'layout floating tiling'
ctrl-alt-slash = 'layout tiles horizontal vertical'
ctrl-alt-comma = 'layout accordion horizontal vertical'
ctrl-alt-r = [
  'layout floating',
  'exec-and-forget ~/.config/aerospace/scripts/size-cycle.sh',
]
ctrl-alt-minus = 'resize smart -50'
ctrl-alt-equal = 'resize smart +50'
ctrl-alt-semicolon = 'mode service'

[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']

# Floating and Centered
[[on-window-detected]]
if = '''
test %{app-bundle-id} = com.apple.systempreferences \
  || test %{app-bundle-id} = cc.ffitch.shottr \
  || test %{app-bundle-id} = com.1password.1password \
  || test %{app-bundle-id} = com.apple.ActivityMonitor \
  || test %{app-bundle-id} = com.apple.calculator \
  || test %{app-bundle-id} = com.apple.finder \
  || test %{app-bundle-id} = com.apple.MobileSMS \
  || test %{app-bundle-id} = com.elgato.StreamDeck \
  || test %{app-bundle-id} = com.tw93.MoleApp \
  || test %{app-bundle-id} = dev.kdrag0n.MacVirt
'''
run = [
  'layout floating',
  'exec-and-forget ~/.config/aerospace/scripts/center-window.sh',
]

# Floating and (non-centered)
[[on-window-detected]]
if = '''
test %{app-bundle-id} = com.sindresorhus.Dato \
|| test %{app-bundle-id} = com.apple.ScreenContinuity
'''
run = 'layout floating'

# Workspace 2: Helium
[[on-window-detected]]
if = 'test %{app-bundle-id} = net.imput.helium'
run = 'move-node-to-workspace 2'

# Workspace 3: Development
[[on-window-detected]]
if = '''
test %{app-bundle-id} = com.mitchellh.ghostty \
  || test %{app-bundle-id} = com.microsoft.VSCode
'''
run = 'move-node-to-workspace 3'

# Workspace 4: Communication
[[on-window-detected]]
if = '''
test %{app-bundle-id} = com.readdle.SparkDesktop \
  || test %{app-bundle-id} = com.spotify.client \
  || test %{app-bundle-id} = ru.keepcoder.Telegram \
  || test %{app-bundle-id} = net.whatsapp.WhatsApp
'''
run = 'move-node-to-workspace 4'

# Workspace 5: Gaming
[[on-window-detected]]
if = '''
test %{app-bundle-id} = com.valvesoftware.steam \
  || test %{app-bundle-id} = com.valvesoftware.steam.helper
'''
run = [
  'move-node-to-workspace 5',
  'layout floating',
  'exec-and-forget ~/.config/aerospace/scripts/center-window.sh',
]

# Catch-all: any window unmatched by the rules above lands in workspace 1.
[[on-window-detected]]
if = 'true'
run = 'move-node-to-workspace 1'
