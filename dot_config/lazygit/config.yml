gui:
  nerdFontsVersion: "3"
  border: rounded
  showRandomTip: false
  skipDiscardChangeWarning: true
  # Catppuccin Mocha (mauve accent)
  theme:
    activeBorderColor:
      - "#cba6f7"
      - bold
    inactiveBorderColor:
      - "#a6adc8"
    searchingActiveBorderColor:
      - "#f9e2af"
      - bold
    optionsTextColor:
      - "#89b4fa"
    selectedLineBgColor:
      - "#313244"
    cherryPickedCommitFgColor:
      - "#cba6f7"
      - bold
    cherryPickedCommitBgColor:
      - "#45475a"
    unstagedChangesColor:
      - "#f38ba8"
      - bold
    defaultFgColor:
      - "#cdd6f4"
  authorColors:
    "*": "#b4befe"
  branchColorPatterns:
    "^main$": "#fab387"
    "^master$": "#fab387"
    "^develop": "#cba6f7"
    "^feature/": "#89dceb"
    "^hotfix/": "#f38ba8"
    "^release/": "#fab387"
    "^bugfix/": "#f38ba8"
    "^fix/": "#f38ba8"
    "^chore/": "#7f849c"
    "^docs/": "#89dceb"
git:
  log:
    order: default
  overrideGpg: true
  pagers:
    - colorArg: always
      pager: delta --paging=never
disableStartupPopups: true
quitOnTopLevelReturn: true
