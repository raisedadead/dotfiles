- name: tmux › panes
  keybinds:
    - name: Navigate left
      key: M-h
    - name: Navigate down
      key: M-j
    - name: Navigate up
      key: M-k
    - name: Navigate right
      key: M-l
    - name: Resize left
      key: C-M-h
    - name: Resize down
      key: C-M-j
    - name: Resize up
      key: C-M-k
    - name: Resize right
      key: C-M-l
    - name: Horizontal split
      key: M-d
    - name: Vertical split
      key: M-D
    - name: Zoom pane
      key: M-S-Enter

- name: tmux › windows
  keybinds:
    - name: New window
      key: M-t
    - name: Next window
      key: M->
    - name: Previous window
      key: M-<
    - name: Window 1-9
      key: M-S-1..9

- name: tmux › sessions
  keybinds:
    - name: Sesh picker
      key: M-o
    - name: Choose-tree
      key: M-w
    - name: New session (prompt)
      key: M-n
    - name: Next session
      key: M-.
    - name: Previous session
      key: M-,
    - name: Session 1-5
      key: M-1..5
    - name: Last session
      key: C-b L

- name: tmux › popups
  keybinds:
    - name: Lazygit
      key: M-g
    - name: Keybindings
      key: M-?
    - name: Command palette
      key: M-p

- name: tmux › prefix (C-b)
  prefix: C-b
  keybinds:
    - name: Pane left / down / up / right
      key: h / j / k / l
    - name: Resize left / down / up / right
      key: H / J / K / L
    - name: Horizontal split
      key: "|"
    - name: Vertical split
      key: "-"
    - name: Kill pane
      key: x
    - name: Kill window
      key: "&"
    - name: Zoom pane
      key: f
    - name: Sync panes
      key: i
    - name: Reload config
      key: r
    - name: Enter copy mode
      key: "["
    - name: Paste buffer
      key: "]"
    - name: Command prompt
      key: ":"
    - name: Detach
      key: d
    - name: New window
      key: c
    - name: Rename window
      key: ","
    - name: Rename session
      key: "$"
    - name: List keybindings
      key: "?"
    - name: Display pane numbers
      key: q
    - name: Choose session
      key: s
    - name: Choose window
      key: w
    - name: Swap pane left / right
      key: "{ / }"
    - name: Last session (sesh)
      key: L
    - name: Thumbs (hint copy)
      key: Space

- name: tmux › thumbs (hint copy)
  keybinds:
    - name: Activate thumbs
      key: C-b Space
    - name: Copy hint to clipboard
      key: hint letter
    - name: Paste hint + clipboard
      key: S-hint letter
    - name: Multi-select mode
      key: Space (after activating)
    - name: Cancel
      key: Esc / q

- name: tmux › copy mode (vi)
  keybinds:
    - name: Begin selection
      key: v
    - name: Rectangle toggle
      key: C-v
    - name: Copy and cancel
      key: y

- name: sesh picker
  keybinds:
    - name: All sources
      key: C-a
    - name: Tmux sessions
      key: C-t
    - name: Configs
      key: C-g
    - name: Zoxide
      key: C-x
    - name: Find directories
      key: C-f
    - name: Kill session
      key: C-d
    - name: Navigate
      key: Tab / S-Tab

- name: ghostty › splits
  keybinds:
    - name: Navigate left / down / up / right
      key: Cmd+S-h/j/k/l
    - name: Resize left / down / up / right
      key: Cmd+C-h/j/k/l
    - name: Equalize splits
      key: Cmd+S-e

- name: ghostty › scrollback
  keybinds:
    - name: Scroll down / up 5 lines
      key: C-S-j / C-S-k
    - name: Scroll to top / bottom
      key: C-S-h / C-S-l
    - name: Export scrollback
      key: Cmd+S-s

- name: ghostty › misc
  keybinds:
    - name: Quick terminal (global)
      key: C-"`"
    - name: Literal newline
      key: S-Enter
    - name: Literal CR
      key: C-Enter
    - name: Copy URL
      key: Cmd+S-c

- name: yazi
  keybinds:
    - name: Open dir in editor
      key: E
    - name: Open file in editor
      key: S-Enter
    - name: Smart enter
      key: Enter / l
    - name: Jump to char
      key: C-f
    - name: Smart filter
      key: f
    - name: Search contents (rg)
      key: S
    - name: Lazygit
      key: g,i
    - name: Copy file contents
      key: M-y
    - name: Parent directory
      key: Backspace
    - name: Trash files
      key: Delete
    - name: Quit (no cd / cd)
      key: q / Q
    - name: Copy file path
      key: C-y
    - name: Help
      key: "?"

- name: fzf (shell)
  keybinds:
    - name: File search
      key: C-t
    - name: Directory navigation
      key: M-c
    - name: Toggle preview
      key: C-/
    - name: Copy to clipboard
      key: C-y
    - name: Preview scroll up / down
      key: S-Up / S-Down

- name: atuin (history)
  keybinds:
    - name: Search history
      key: C-r
    - name: Vim-normal mode (inside atuin)
      key: Esc

- name: zsh (emacs mode)
  keybinds:
    - name: Toggle vi mode
      key: C-z
    - name: Forward / backward word
      key: M-f / M-b
    - name: Beginning / end of line (Alt)
      key: M-S-b / M-S-f
    - name: Beginning / end of line
      key: C-a / C-e
    - name: Forward / backward char
      key: C-f / C-b
    - name: Delete char forward / back
      key: C-d / Backspace
    - name: Delete word backward
      key: C-w
    - name: Kill to end of line
      key: C-k
    - name: Kill to beginning of line
      key: C-u
    - name: Yank (paste killed text)
      key: C-y
    - name: Transpose chars
      key: C-t
    - name: Clear screen
      key: C-l
    - name: Accept line (run command)
      key: C-m / Enter
    - name: Search history backward
      key: C-r
    - name: Search history forward
      key: C-s
    - name: Previous / next history
      key: C-p / C-n
    - name: Cancel
      key: C-c
    - name: EOF / exit
      key: C-d

- name: zsh (vi cmd mode)
  keybinds:
    - name: Toggle back to emacs
      key: C-z
    - name: Move left / down / up / right
      key: h / j / k / l
    - name: Word forward / back
      key: w / b
    - name: End of word
      key: e
    - name: Beginning / end of line
      key: 0 / $
    - name: Insert / append
      key: i / a
    - name: Insert at beginning / end
      key: I / A
    - name: Delete char
      key: x
    - name: Change word / line
      key: cw / cc
    - name: Delete word / line
      key: dw / dd
    - name: Paste after / before
      key: p / P
    - name: Undo / redo
      key: u / C-r
    - name: Search backward
      key: "?"
    - name: Search forward
      key: /
