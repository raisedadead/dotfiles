# Monitoring
set -g monitor-bell on
set -g visual-bell off
set -g bell-action other
set -g monitor-activity on
set -g visual-activity off
set -g activity-action other
set -g allow-passthrough on

# Borders and messages
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=white
set -g popup-border-style fg=white
set -g popup-style default
set -g message-style bg=yellow,fg=black
set -g message-command-style bg=cyan,fg=black
set -g mode-style bg=brightblack,fg=white
set -g display-time 1500

# Status bar — three-zone layout via status-format[0]
#
# ┌─ left ──────────┬── centre ────────────────────────────────┬────── right ──────┐
# │ window ●ⁿ dots   │ ← ❮ session // 1:zsh / 2:vim / 3:node ❯│ session ■ⁿ squares│
# └─────────────────┴────────────────────────────────────────┴───────────────────┘
#
# Left zone: window dots (only shown when session has >= 2 windows)
#   #{W:inactive,active} iterates windows in current session
#   Colors: yellow=active, brightyellow=bell, red=error, blue=activity, brightblack=idle
#   Superscript pane count (²-⁹) on each dot when window has >= 2 panes
#
# Centre zone:
#   ← shown before chevron when pane is zoomed (indicates "go back")
#   ^B in yellow when prefix key is active
#   Session name in magenta, separator // and window info in brightblack (dimmed)
#   1 window:  ❮ session // window_name ❯
#   2+ windows: ❮ session // 1:zsh / 2:vim / 3:node ❯
#   Active window in cyan, inactive in brightblack, / separator
#
# Right zone: session list squares via #{S:inactive,active}
#   Colors: green=attached, brightblack=other
#   Superscript window count (²-⁹) when session has >= 2 windows
#   10+ windows shows ⁺ as catch-all
#
set -g status-style bg=default,fg=brightblack
set -g status-format[0] "\
#[align=left]\
#{?#{>:#{session_windows},1},\
#{W:\
#{?window_bell_flag,#[fg=brightyellow],\
#{?#{&&:#{@last_exit_code},#{!=:#{@last_exit_code},0}},#[fg=red],#{?window_activity_flag,#[fg=blue],#[fg=brightblack]}\
}}●\
#{?#{>:#{window_panes},1},\
#{?#{==:#{window_panes},2},²,\
#{?#{==:#{window_panes},3},³,\
#{?#{==:#{window_panes},4},⁴,\
#{?#{==:#{window_panes},5},⁵,\
#{?#{==:#{window_panes},6},⁶,\
#{?#{==:#{window_panes},7},⁷,\
#{?#{==:#{window_panes},8},⁸,\
#{?#{==:#{window_panes},9},⁹,\
⁺}}}}}}}}, \
}\
,\
#[fg=yellow]●\
#{?#{>:#{window_panes},1},\
#{?#{==:#{window_panes},2},²,\
#{?#{==:#{window_panes},3},³,\
#{?#{==:#{window_panes},4},⁴,\
#{?#{==:#{window_panes},5},⁵,\
#{?#{==:#{window_panes},6},⁶,\
#{?#{==:#{window_panes},7},⁷,\
#{?#{==:#{window_panes},8},⁸,\
#{?#{==:#{window_panes},9},⁹,\
⁺}}}}}}}}, \
}\
},\
}\
#[align=centre]\
#{?client_prefix,#[fg=yellow]^B ,}\
#{?window_zoomed_flag,#[fg=brightblack]← ,}\
#[fg=white]❮ \
#[fg=magenta]#{session_name} \
#[fg=brightblack]// \
#{W:\
#{?#{>:#{session_windows},1},#[fg=brightblack]#{window_index}:,}#[fg=brightblack]#{window_name}#{?loop_last_flag,, #[fg=brightblack]/ }\
,\
#{?#{>:#{session_windows},1},#[fg=cyan]#{window_index}:,}#[fg=cyan]#{window_name}#{?loop_last_flag,, #[fg=brightblack]/ }\
}\
 #[fg=white]❯\
#[align=right]\
#{S:\
#[fg=brightblack]■\
#{?#{>:#{session_windows},1},\
#{?#{==:#{session_windows},2},²,\
#{?#{==:#{session_windows},3},³,\
#{?#{==:#{session_windows},4},⁴,\
#{?#{==:#{session_windows},5},⁵,\
#{?#{==:#{session_windows},6},⁶,\
#{?#{==:#{session_windows},7},⁷,\
#{?#{==:#{session_windows},8},⁸,\
#{?#{==:#{session_windows},9},⁹,\
⁺}}}}}}}}, \
}\
,\
#[fg=green]■\
#{?#{>:#{session_windows},1},\
#{?#{==:#{session_windows},2},²,\
#{?#{==:#{session_windows},3},³,\
#{?#{==:#{session_windows},4},⁴,\
#{?#{==:#{session_windows},5},⁵,\
