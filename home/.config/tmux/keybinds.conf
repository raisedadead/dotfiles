# Pane navigation (prefix-free)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Pane resize (prefix-free)
bind -n C-M-h resize-pane -L 2
bind -n C-M-j resize-pane -D 2
bind -n C-M-k resize-pane -U 2
bind -n C-M-l resize-pane -R 2

# Pane navigation/resize (prefix fallback)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Splits and windows (prefix-free)
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-D split-window -v -c "#{pane_current_path}"
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-S-Enter resize-pane -Z

# Splits (prefix, preserve cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Window cycling
bind -n 'M->' next-window
bind -n 'M-<' previous-window

# Direct window access (Alt+1..9)
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Actions
bind x kill-pane
bind f resize-pane -Z
bind i setw synchronize-panes
bind r source-file ~/.config/tmux/tmux.conf \; display 'Tmux config reloaded'

# Copy mode (vi)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Session management (sesh)
bind -n M-o run-shell "~/.config/tmux/scripts/sesh-popup.sh || true"
bind -n M-. switch-client -n
bind -n M-, switch-client -p
bind -n M-n display-popup -E -w 20% -h 5 -b rounded -T ' New Session ' "~/.config/tmux/scripts/new-session-popup.sh"
bind L run-shell "sesh last"

# Tree view (sessions + windows)
bind -n M-w choose-tree -Zw -F "#{?pane_format,#{pane_current_command} #{pane_current_path},#{?window_format,#{window_name} (#{window_panes} panes),#{session_name} (#{session_windows} win)}}"

# Popups
bind -n M-g display-popup -E -w 70% -h 80% -b rounded -T '#[align=centre] Lazygit ' -d "#{pane_current_path}" lazygit
bind -n M-? run-shell "~/.config/tmux/scripts/keyb-popup.sh || true"
bind -n M-p run-shell "~/.config/tmux/scripts/command-palette.sh || true"
