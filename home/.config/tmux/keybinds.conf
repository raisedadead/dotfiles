# Seamless navigation: neovim splits + tmux panes (via smart-splits.nvim)
# When @pane-is-vim is set, forward keys to neovim; otherwise tmux handles them
bind-key -n C-M-h if -F "#{@pane-is-vim}" "send-keys C-M-h" "select-pane -L"
bind-key -n C-M-j if -F "#{@pane-is-vim}" "send-keys C-M-j" "select-pane -D"
bind-key -n C-M-k if -F "#{@pane-is-vim}" "send-keys C-M-k" "select-pane -U"
bind-key -n C-M-l if -F "#{@pane-is-vim}" "send-keys C-M-l" "select-pane -R"

# Pane navigation (prefix fallback)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (prefix, repeatable)
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# Splits and windows (prefix-free)
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-S-D split-window -v -c "#{pane_current_path}"
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-S-Enter resize-pane -Z

# Splits (prefix, preserve cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Equalize layouts (prefix only)
bind e select-layout even-vertical
bind E select-layout even-horizontal

# Window cycling
bind -n M-, previous-window
bind -n M-. next-window

# Rename (prefix-free)
bind -n M-r command-prompt -I "#W" "rename-window -- '%%'"
bind -n M-R command-prompt -I "#S" "rename-session -- '%%'"

# Direct window access (Alt+1..9)
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Actions
bind x kill-pane
bind f resize-pane -Z
bind i setw synchronize-panes
bind r source-file ~/.config/tmux/tmux.conf \; display 'Tmux config reloaded'

# Copy mode (vi)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Copy-mode pane navigation (smart-splits)
bind -T copy-mode-vi C-M-h select-pane -L
bind -T copy-mode-vi C-M-j select-pane -D
bind -T copy-mode-vi C-M-k select-pane -U
bind -T copy-mode-vi C-M-l select-pane -R

# Mouse: disable tmux selection — use Shift+drag for native Ghostty selection (Cmd+C to copy)
unbind -T root MouseDrag1Pane
unbind -T root DoubleClick1Pane
unbind -T root TripleClick1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDrag1Pane
unbind -T copy-mode-vi DoubleClick1Pane
unbind -T copy-mode-vi TripleClick1Pane

# Scroll: auto-exit copy mode when reaching bottom
bind -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X scroll-down \; if -F "#{scroll_position}" "" "send-keys -X cancel"

# Session management (sesh)
bind -n M-o run-shell "~/.config/tmux/scripts/sesh-popup.sh || true"
bind -n M-Tab switch-client -n
bind -n M-BTab switch-client -p
bind -n M-n display-popup -E -w 20% -h 5 -b rounded -T '#[align=centre] New Session ' "~/.config/tmux/scripts/new-session-popup.sh"
bind S run-shell "sesh last"

# Tree view (sessions + windows)
bind -n M-w choose-tree -Zw -F "#{?pane_format,#{pane_current_command} #{pane_current_path},#{?window_format,#{window_name} (#{window_panes} panes),#{session_name} (#{session_windows} win)}}"

# Popups
bind -n M-g display-popup -E -w 70% -h 80% -b rounded -T '#[align=centre] Lazygit ' -d "#{pane_current_path}" lazygit
bind -n M-? run-shell "~/.config/tmux/scripts/keyb-popup.sh || true"
bind -n M-p run-shell "~/.config/tmux/scripts/command-palette.sh || true"
