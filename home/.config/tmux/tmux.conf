# Options
set -sg terminal-overrides ",*:RGB"
set -g status-position top
set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g focus-events on
set -g history-limit 100000
set -g mouse on
set -g renumber-windows on
set -g set-clipboard on
set-window-option -g mode-keys vi

# Pane navigation (prefix fallback, Ctrl+hjkl handled by vim-tmux-navigator plugin)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize (prefix, repeatable)
bind -r H resize-pane -L
bind -r J resize-pane -D
bind -r K resize-pane -U
bind -r L resize-pane -R

# Pane navigation (prefix-free)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Splits and windows (prefix-free, Ghostty-style)
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-D split-window -v -c "#{pane_current_path}"
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-S-Enter resize-pane -Z

# Splits (prefix, preserve cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Window cycling
bind -n M-n next-window
bind -n M-p previous-window

# Direct window access
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Actions
bind x kill-pane
bind f resize-pane -Z
bind i setw synchronize-panes
bind r source-file ~/.config/tmux/tmux.conf \; display 'tmux.conf sourced'

# Copy mode (vi)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Monitoring
set -g monitor-activity on
set -g monitor-bell on
set -g visual-activity off
set -g visual-bell off
set -g activity-action other
set -g bell-action other

# Theme (ANSI tokens only — portable across terminal themes)
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=white
set -g status-style bg=default,fg=brightblack
set -g status-left ""
set -g status-right "#{S:#[fg=brightblack]■ ,#[fg=magenta]■ #{session_name} }"
set -g status-right-length 80
set -g window-status-format "#{?window_bell_flag,#[fg=red],#{?window_activity_flag,#[fg=yellow],#[fg=brightblack]}}●"
set -g window-status-current-format "#[fg=magenta]●"
set -gw window-status-activity-style none
set -gw window-status-bell-style none

# Session management (sesh)
bind -n M-o run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
bind -n M-N switch-client -n
bind -n M-P switch-client -p
bind L run-shell "sesh last"

# Direct session access (Alt+Shift+1..5)
bind -n 'M-!' run-shell "tmux switch-client -t \"$(tmux list-sessions -F '#S' | sed -n '1p')\""
bind -n 'M-@' run-shell "tmux switch-client -t \"$(tmux list-sessions -F '#S' | sed -n '2p')\""
bind -n 'M-#' run-shell "tmux switch-client -t \"$(tmux list-sessions -F '#S' | sed -n '3p')\""
bind -n 'M-$' run-shell "tmux switch-client -t \"$(tmux list-sessions -F '#S' | sed -n '4p')\""
bind -n 'M-%' run-shell "tmux switch-client -t \"$(tmux list-sessions -F '#S' | sed -n '5p')\""

# Popups
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" lazygit
bind y display-popup -E -w 80% -h 80% -d "#{pane_current_path}" yazi
bind -n M-i display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind C run-shell '\
  popup_session="claude-$(echo #{pane_current_path} | md5 -q | cut -c1-8)"; \
  tmux has-session -t "$popup_session" 2>/dev/null || \
  tmux new-session -d -s "$popup_session" -c "#{pane_current_path}" "claude"; \
  tmux display-popup -w 90% -h 85% -E "tmux attach-session -t $popup_session"'

# Plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'tmux-plugins/tpm'
run '~/.config/tmux/plugins/tpm/tpm'
