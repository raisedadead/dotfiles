# Options
set -sg terminal-overrides ",*:RGB"
set -g status-position top
set -g base-index 1
set -g pane-base-index 1
set -g detach-on-destroy off
set -g escape-time 0
set -g focus-events on
set -g history-limit 100000
set -g mouse on
set -g renumber-windows on
set -g set-clipboard on
set-window-option -g mode-keys vi

# Pane navigation (prefix-free)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Pane resize (prefix-free)
bind -n C-M-h resize-pane -L 2
bind -n C-M-j resize-pane -D 2
bind -n C-M-k resize-pane -U 2
bind -n C-M-l resize-pane -R 2

# Pane navigation/resize (prefix fallback)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L
bind -r J resize-pane -D
bind -r K resize-pane -U
bind -r L resize-pane -R

# Splits and windows (prefix-free, Ghostty-style)
bind -n M-d split-window -h -c "#{pane_current_path}"
bind -n M-D split-window -v -c "#{pane_current_path}"
bind -n M-t new-window -c "#{pane_current_path}"
bind -n M-S-Enter resize-pane -Z

# Splits (prefix, preserve cwd)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Window cycling
bind -n M-n next-window
bind -n M-p previous-window

# Direct window access
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Actions
bind x kill-pane
bind f resize-pane -Z
bind i setw synchronize-panes
bind r source-file ~/.config/tmux/tmux.conf \; display 'Tmux config reloaded'

# Copy mode (vi)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# Monitoring
set -g monitor-activity on
set -g monitor-bell on
set -g visual-activity off
set -g visual-bell off
set -g activity-action other
set -g bell-action other
set -g allow-passthrough on

# Theme (ANSI tokens — colors map through terminal theme)
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=white
set -g popup-border-style fg=white
set -g popup-style default
set -g message-style bg=magenta,fg=black
set -g message-command-style bg=cyan,fg=black
set -g mode-style bg=brightblack,fg=white
set -g display-time 1500
set -g status-style bg=default,fg=brightblack
set -g status-left ""
set -g status-right "#{S:#[fg=brightblack]■ ,#[fg=green]■ #{session_name} }"
set -g status-right-length 80
set -g window-status-format "#{?window_bell_flag,#[fg=brightyellow],#{?#{&&:#{@last_exit_code},#{!=:#{@last_exit_code},0}},#[fg=red],#{?window_activity_flag,#[fg=yellow],#[fg=brightblack]}}}●"
set -g window-status-current-format "#[fg=magenta]●"
set -gw window-status-activity-style none
set -gw window-status-bell-style none

# Session management (sesh)
bind -n M-o run-shell "~/.config/tmux/scripts/sesh-popup.sh || true"
bind -n M-N switch-client -n
bind -n M-P switch-client -p
bind L run-shell "sesh last"

# Direct session access (Alt+Shift+1..5)
bind -n 'M-!' run-shell "tmux switch-client -t \"$(tmux list-sessions -F '#S' | sed -n '1p')\""
bind -n 'M-@' run-shell "tmux switch-client -t \"$(tmux list-sessions -F '#S' | sed -n '2p')\""
bind -n 'M-#' run-shell "tmux switch-client -t \"$(tmux list-sessions -F '#S' | sed -n '3p')\""
bind -n 'M-$' run-shell "tmux switch-client -t \"$(tmux list-sessions -F '#S' | sed -n '4p')\""
bind -n 'M-%' run-shell "tmux switch-client -t \"$(tmux list-sessions -F '#S' | sed -n '5p')\""

# Tree view (sessions + windows)
bind -n M-w choose-tree -Zw -F "#{?pane_format,#{pane_current_command} #{pane_current_path},#{?window_format,#{window_name} (#{window_panes} panes),#{session_name} (#{session_windows} win)}}"

# Popups
bind -n M-g display-popup -E -w 70% -h 80% -b rounded -d "#{pane_current_path}" lazygit
bind -n M-? run-shell "~/.config/tmux/scripts/keyb-popup.sh || true"

# Plugins
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'fcsonline/tmux-thumbs'

# tmux-thumbs
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'tmux set-buffer -- {} && tmux paste-buffer && echo -n {} | pbcopy'
set -g @thumbs-reverse enabled
set -g @thumbs-unique enabled
set -g @thumbs-position off_left
set -g @thumbs-osc52 enabled
set -g @thumbs-bg-color black
set -g @thumbs-fg-color green
set -g @thumbs-hint-bg-color black
set -g @thumbs-hint-fg-color magenta
set -g @thumbs-select-fg-color cyan
set -g @thumbs-select-bg-color black
set -g @thumbs-multi-fg-color red
set -g @thumbs-multi-bg-color black

set -g @plugin 'tmux-plugins/tpm'
run '~/.config/tmux/plugins/tpm/tpm'
